<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ramadan Grocery List</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">
  <h2 class="text-center mb-4">Ramadan Grocery List</h2>

  <!-- Input Group -->
  <div class="input-group mb-3">
    <input type="text" id="itemInput" class="form-control" placeholder="Enter item (e.g. Dates)">
    <button class="btn btn-success" onclick="addItem()">Add Item</button>
  </div>

  <!-- Empty List -->
  <ul id="list" class="list-group"></ul>
</div>

<script>
  function addItem() {
    var input = document.getElementById("itemInput");
    var value = input.value.trim();

    if (value === "") {
      alert("Please enter an item!");
      return;
    }

    // Create li
    var li = document.createElement("li");
    li.className = "list-group-item";
    li.textContent = value;

    // Add to list
    document.getElementById("list").appendChild(li);

    // Clear input
    input.value = "";
  }
</script>

</body>
</html>
